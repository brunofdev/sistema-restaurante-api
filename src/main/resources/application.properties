spring.application.name=api-restaurante


# configuracao do JPA Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha

# definir o caminho do Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Caminho da documentacao OpenAPI
springdoc.api-docs.path=/v3/api-docs

# Escanear pacotes do projeto
springdoc.packages-to-scan=com.restaurante01

# JTW CONFIG
jwt.secret.key=SuaChaveJWTSuperLongaESeguraGeradaEmBase64ParaTestesLocais123456789=
jwt.expiration.ms=3600000

# Configuraçőes do Banco H2
spring.datasource.url=jdbc:h2:mem:restaurantedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilita o Console do H2 no navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

